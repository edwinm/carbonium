name: Coveralls

on: ["push", "pull_request"]

jobs:
  test:
    name: Run units tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Install
        run: npm ci --ignore-scripts
      - name: Install Playwright browsers
        run: npm run playwright:install
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
